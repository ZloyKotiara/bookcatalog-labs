name: ci-cd

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore app
        run: dotnet restore ./src/BookCatalog.Web/BookCatalog.Web.csproj

      - name: Restore tests
        run: dotnet restore ./tests/BookCatalog.Web.Tests/BookCatalog.Web.Tests.csproj

      - name: Build app
        run: dotnet build ./src/BookCatalog.Web/BookCatalog.Web.csproj --configuration Release --no-restore

      - name: Build tests
        run: dotnet build ./tests/BookCatalog.Web.Tests/BookCatalog.Web.Tests.csproj --configuration Release --no-restore

      - name: Run functional tests
        run: dotnet test ./tests/BookCatalog.Web.Tests/BookCatalog.Web.Tests.csproj --configuration Release --no-build --verbosity normal

  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/bookcatalog-web
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose variables from GitHub Secrets
        run: |
          cat > .env.ci <<EOF
          DB_NAME=${DB_NAME}
          DB_USER=${DB_USER}
          DB_PASSWORD=${DB_PASSWORD}
          DB_HOST=${DB_HOST}
          DB_PORT=${DB_PORT}
          EOF
          docker compose --env-file .env.ci config

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build             -f src/BookCatalog.Web/Dockerfile             -t $IMAGE_NAME:latest             -t $IMAGE_NAME:${{ github.sha }}             .

      - name: Push image
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}
