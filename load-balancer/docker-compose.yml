services:
  node1:
    build:
      context: .
      dockerfile: src/NodeInfo.App/Dockerfile
    environment:
      NODE_NAME: "Нода 1"

  node2:
    build:
      context: .
      dockerfile: src/NodeInfo.App/Dockerfile
    environment:
      NODE_NAME: "Нода 2"

  node3:
    build:
      context: .
      dockerfile: src/NodeInfo.App/Dockerfile
    environment:
      NODE_NAME: "Нода 3"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - node1
      - node2
      - node3
    ports:
      - "8088:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
